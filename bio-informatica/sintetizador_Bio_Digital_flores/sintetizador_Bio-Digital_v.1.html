<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nana Botánica - Proyecto Flores V1</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #818cf8;
            --accent: #e74c3c;
            --bg-color: #0f172a;
            --text: #333;
            --white: #ffffff;
            --black: #1e293b;
            --color-fuente: #fff;
            --color_fondo: #000;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --energy-color: #f9e231;
            --border-color: #30363d;
            --footer-color: #8b949e;
            
            /* Variable dinámica que cambiará con el ADN */
            --flower-color: var(--secondary);
        }

        body {
            background-color: var(--bg-color);
            color: var(--color-fuente);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }

        /* SECCIÓN 1: PANEL DE SECUENCIADO */
        .panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        textarea {
            width: 100%;
            height: 100px;
            background: var(--black);
            color: var(--energy-color);
            border: 1px solid var(--accent-color);
            border-radius: 5px;
            font-family: monospace;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
        }

        /* SECCIÓN 2: ANALIZADOR DE BIO-BRICKS */
        .bricks-display {
            margin-top: 15px;
            padding: 10px;
            background: #000;
            border-left: 4px solid var(--accent-color);
            font-size: 0.9em;
            min-height: 50px;
        }

        /* SECCIÓN 3: INVERNADERO VIRTUAL */
        .greenhouse {
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .flower-svg {
            width: 200px;
            transition: all 0.8s ease;
        }

        .petal {
            fill: var(--flower-color);
            transition: fill 0.5s ease;
        }

        .center {
            fill: var(--energy-color);
        }

        button {
            margin-top: 10px;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>🌱 Bio-Synthesizer V1.0</h1>
    
    <div class="container">
        <div class="panel">
            <h3>1. Panel de Secuenciado ADN</h3>
            <p>Ingresa secuencia (A, C, G, T):</p>
            <textarea id="dnaInput" placeholder="Ejemplo: ATGC-RED-GATTACA...">ATGC-RED</textarea>
            <button onclick="synthesizeFlower()">Sintetizar Especie</button>

            <h3>2. Analizador de Bio-Bricks</h3>
            <div id="bricksLog" class="bricks-display">
                Esperando secuencia...
            </div>
        </div>

        <div class="greenhouse">
            <svg class="flower-svg" viewBox="0 0 100 100">
                <rect x="48" y="60" width="4" height="40" fill="#2d5a27" />
                <circle class="petal" cx="50" cy="35" r="15" />
                <circle class="petal" cx="65" cy="50" r="15" />
                <circle class="petal" cx="50" cy="65" r="15" />
                <circle class="petal" cx="35" cy="50" r="15" />
                <circle class="center" cx="50" cy="50" r="8" />
            </svg>
            <div style="position: absolute; bottom: 10px; right: 10px; font-size: 0.7em; color: var(--footer-color);">
                MODO: Simulación Fenotípica
            </div>
        </div>
    </div>

    <script>
        /**
         * FUNCIÓN PRINCIPAL: Simula el dogma central de la biología.
         * Lee el ADN -> Traduce a "Proteína Visual" -> Expresa el Fenotipo.
         */
        function synthesizeFlower() {
            const dna = document.getElementById('dnaInput').value.toUpperCase();
            const log = document.getElementById('bricksLog');
            
            // Limpiamos el log de Bio-Bricks
            log.innerHTML = "<strong>Analizando secuencias...</strong><br>";

            // 1. Diccionario de Bio-Bricks (Mapeo de ADN a propiedades)
            // En versiones futuras esto puede ser una base de datos externa.
            const bioBricks = {
                "RED": { color: "#e74c3c", name: "Gen de Antocianina Roja" },
                "BLUE": { color: "#58a6ff", name: "Gen de Delphinidina Azul" },
                "GOLD": { color: "#f9e231", name: "Gen de Flavonoide Dorado" },
                "PURP": { color: "#818cf8", name: "Gen de Pigmento Púrpura" }
            };

            let matchFound = false;

            // 2. Lógica del Analizador (Búsqueda de patrones)
            for (let key in bioBricks) {
                if (dna.includes(key)) {
                    const brick = bioBricks[key];
                    
                    // Aplicar cambio visual (Fenotipo)
                    document.documentElement.style.setProperty('--flower-color', brick.color);
                    
                    // Notificar en el panel
                    log.innerHTML += `✅ Detectado: ${brick.name} (Secuencia: ${key})<br>`;
                    matchFound = true;
                }
            }

            // 3. Análisis de complejidad (Contenido GC como factor de "energía")
            const gcContent = calculateGC(dna);
            log.innerHTML += `🧬 Contenido GC: ${gcContent}%`;

            if (!matchFound) {
                log.innerHTML += "⚠️ No se detectaron Bio-Bricks conocidos. Usando fenotipo base.";
                document.documentElement.style.setProperty('--flower-color', 'var(--secondary)');
            }
        }

        /**
         * FUNCIÓN DE APOYO: Calcula el porcentaje de Guanina y Citosina.
         * En biología real, un alto GC indica mayor estabilidad térmica.
         */
        function calculateGC(sequence) {
            const cleanSeq = sequence.replace(/[^ATGC]/g, "");
            if (cleanSeq.length === 0) return 0;
            const gc = cleanSeq.split('').filter(base => base === 'G' || base === 'C').length;
            return ((gc / cleanSeq.length) * 100).toFixed(2);
        }
    </script>
</body>
</html>
