<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nano-Engine: Matrix Heatmap & Bio-Scanner</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #818cf8;
            --accent: #e74c3c;
            --bg-color: #0f172a;
            --text: #c9d1d9;
            --white: #ffffff;
            --black: #1e293b;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --energy-color: #f9e231;
            --border-color: #30363d;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        h1 { color: var(--accent-color); text-align: center; text-transform: uppercase; letter-spacing: 2px; }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: var(--black);
            color: var(--energy-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            font-family: 'Courier New', monospace;
        }

        button {
            grid-column: span 2;
            background: linear-gradient(45deg, var(--secondary), var(--accent-color));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
        }

        button:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.5);
        }

        /* ESTILOS DE LA MATRIZ DE CALOR */
        .heatmap-container {
            margin-top: 30px;
            overflow-x: auto;
            background: #000;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        table {
            border-collapse: collapse;
            margin: 0 auto;
        }

        td, th {
            width: 35px;
            height: 35px;
            border: 1px solid #222;
            text-align: center;
            font-size: 0.7rem;
            font-family: monospace;
            transition: all 0.2s;
        }

        th { background: var(--primary); color: white; }

        /* Brillo Neón Verde: Éxito/Transformación */
        .high-score {
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green), 0 0 15px var(--neon-green);
            background: rgba(57, 255, 20, 0.15);
            font-weight: bold;
            border: 1px solid var(--neon-green) !important;
        }

        /* Brillo Rojo Fluorescente: Fallo/Enfermedad */
        .low-score {
            color: var(--neon-red);
            text-shadow: 0 0 8px var(--neon-red), 0 0 15px var(--neon-red);
            background: rgba(255, 49, 49, 0.1);
        }

        .result-text {
            margin-top: 20px;
            padding: 20px;
            background: #0a0e14;
            border-left: 4px solid var(--accent-color);
            font-family: 'Courier New', monospace;
            white-space: pre;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧬 Bio-Genetic Scanner v2.0</h1>
    
    <div class="control-panel">
        <div>
            <label>Secuencia Genómica (Referencia):</label>
            <textarea id="seqA">TTCGATCGGCTACGATCGATA</textarea>
        </div>
        <div>
            <label>Carga Genética (Target/Modificación):</label>
            <textarea id="seqB">CGATCGGCTAC</textarea>
        </div>
        <button onclick="analyzeDNA()">INICIAR ESCANEO DE HOMOLOGÍA</button>
    </div>

    <div class="legend">
        <span><b style="color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green);">●</b> Zona de Alta Transformación</span>
        <span><b style="color: var(--neon-red); text-shadow: 0 0 5px var(--neon-red);">●</b> Riesgo de Inestabilidad/Fallo</span>
    </div>

    <div id="resultOutput" class="result-text" style="display:none;"></div>

    <div class="heatmap-container" id="heatmapWrapper" style="display:none;">
        <h3 style="text-align:center; color: var(--energy-color);">Visualización de Matriz de Calor (Smith-Waterman)</h3>
        <table id="matrixTable"></table>
    </div>
</div>

<script>
    function analyzeDNA() {
        const s1 = document.getElementById('seqA').value.toUpperCase().replace(/\s/g, '');
        const s2 = document.getElementById('seqB').value.toUpperCase().replace(/\s/g, '');
        
        if (s1.length === 0 || s2.length === 0) return;

        // Parámetros Bio-Sintéticos
        const MATCH = 3;
        const MISMATCH = -2;
        const GAP = -2;

        const n = s1.length;
        const m = s2.length;
        let matrix = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
        let maxScore = 0;

        // Llenado de matriz
        for (let i = 1; i <= m; i++) {
            for (let j = 1; j <= n; j++) {
                let score = (s2[i-1] === s1[j-1]) ? MATCH : MISMATCH;
                matrix[i][j] = Math.max(0, matrix[i-1][j-1] + score, matrix[i-1][j] + GAP, matrix[i][j-1] + GAP);
                if (matrix[i][j] > maxScore) maxScore = matrix[i][j];
            }
        }

        renderHeatmap(matrix, s1, s2, maxScore);
        generateAlignmentText(matrix, s1, s2, maxScore);
    }

    function renderHeatmap(matrix, s1, s2, maxScore) {
        const wrapper = document.getElementById('heatmapWrapper');
        const table = document.getElementById('matrixTable');
        wrapper.style.display = 'block';
        table.innerHTML = "";

        // Header
        let headRow = "<tr><th></th><th>-</th>";
        for (let char of s1) headRow += `<th>${char}</th>`;
        headRow += "</tr>";
        table.innerHTML += headRow;

        for (let i = 0; i <= s2.length; i++) {
            let row = `<tr><th>${i === 0 ? '-' : s2[i-1]}</th>`;
            for (let j = 0; j <= s1.length; j++) {
                let val = matrix[i][j];
                let className = "";
                
                // Lógica de Brillo Neón solicitada
                if (val > 0 && val >= maxScore * 0.7) {
                    className = "high-score"; // Verde: Mayor transformación
                } else if (val === 0 && (i > 0 && j > 0)) {
                    className = "low-score";  // Rojo: Fallo o desajuste
                }

                row += `<td class="${className}">${val}</td>`;
            }
            row += "</tr>";
            table.innerHTML += row;
        }
    }

    function generateAlignmentText(matrix, s1, s2, maxScore) {
        const out = document.getElementById('resultOutput');
        out.style.display = 'block';
        out.innerHTML = `ANÁLISIS COMPLETADO\n---------------------------------\nPuntuación Bio-Energética Máxima: ${maxScore}\n` +
                        `Estado: ${maxScore > 15 ? 'TRANSFORMACIÓN VIABLE' : 'ALTA PROBABILIDAD DE RECHAZO'}`;
    }
</script>

</body>
</html>
