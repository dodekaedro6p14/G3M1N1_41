<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nano-BLAST Sequence Aligner</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #818cf8;
            --accent: #e74c3c;
            --bg-color: #0f172a;
            --text-color: #c9d1d9;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .blast-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #0d1117;
            color: #7ee787; /* Color tipo terminal bioinformática */
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            margin-bottom: 1rem;
        }

        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: var(--accent-color); }

        #status {
            margin-top: 15px;
            font-style: italic;
            color: var(--accent);
        }

        .results-area {
            margin-top: 20px;
            background: #1e293b;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<div class="blast-container">
    <h2>🧬 Algoritmo de Alineamiento DNA (NCBI API)</h2>
    <p>Introduce tu secuencia en formato FASTA para buscar homólogos en la base de datos <i>nr/nt</i>:</p>
    
    <textarea id="sequenceInput" placeholder=">Secuencia_Fungi_01&#10;ATGCGATCGTAGCTAGCTAGCTAGCTAGCT..."></textarea>
    
    <button onclick="runBlast()">Ejecutar Alineamiento BLASTn</button>
    
    <div id="status">Esperando entrada...</div>
    <div id="results" class="results-area"></div>
</div>

<script>
    const NCBI_URL = "https://blast.ncbi.nlm.nih.gov/Blast.cgi";

    async function runBlast() {
        const sequence = document.getElementById('sequenceInput').value;
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');

        if (!sequence) {
            statusDiv.innerText = "Error: Introduce una secuencia válida.";
            return;
        }

        statusDiv.innerText = "🚀 Enviando secuencia a NCBI...";

        try {
            // PASO 1: Enviar solicitud PUT
            // Nota: En un entorno real de navegador, podrías enfrentar problemas de CORS. 
            // Se recomienda usar un proxy o Node.js.
            const params = new URLSearchParams({
                CMD: 'Put',
                PROGRAM: 'blastn',
                DATABASE: 'nt',
                QUERY: sequence
            });

            const response = await fetch(`${NCBI_URL}?${params.toString()}`);
            const text = await response.text();
            
            // Extraer el RID (Request ID) usando una expresión regular
            const ridMatch = text.match(/^    RID = (.*$)/m);
            const rtoeMatch = text.match(/^    RTOE = (.*$)/m);

            if (!ridMatch) {
                statusDiv.innerText = "Error al obtener RID de NCBI.";
                return;
            }

            const RID = ridMatch[1].trim();
            const RTOE = rtoeMatch ? rtoeMatch[1].trim() : "30";

            statusDiv.innerHTML = `RID: <b style="color:var(--accent-color)">${RID}</b>. Tiempo estimado: ${RTOE}s. Consultando...`;

            // PASO 2: Polling (Consultar cada 20 segundos)
            checkStatus(RID);

        } catch (error) {
            statusDiv.innerText = "Error de conexión: " + error.message;
        }
    }

    async function checkStatus(rid) {
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');

        const params = new URLSearchParams({
            CMD: 'Get',
            FORMAT_OBJECT: 'SearchInfo',
            RID: rid
        });

        const response = await fetch(`${NCBI_URL}?${params.toString()}`);
        const text = await response.text();

        if (text.includes("Status=WAITING")) {
            setTimeout(() => checkStatus(rid), 20000); // Reintentar en 20s
            statusDiv.innerText = "Buscando en la base de datos... (Status: WAITING)";
        } else if (text.includes("Status=READY")) {
            statusDiv.innerText = "¡Alineamiento completado!";
            fetchResults(rid);
        } else {
            statusDiv.innerText = "Error en el proceso de búsqueda.";
        }
    }

    async function fetchResults(rid) {
        const resultsDiv = document.getElementById('results');
        const params = new URLSearchParams({
            CMD: 'Get',
            FORMAT_TYPE: 'Text', // Puede ser XML o JSON para parsear datos específicos
            RID: rid
        });

        const response = await fetch(`${NCBI_URL}?${params.toString()}`);
        const data = await response.text();
        
        resultsDiv.innerHTML = `<pre>${data}</pre>`;
    }
</script>

</body>
</html>
