<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Monitor Anatómico Advanced - Proyecto Dora (Diabetes Tipo 2)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">
        <header class="scientific-input-bar">
            <h1>Monitor de Investigación Sistémica - Diabetes Tipo 2</h1>
            <div class="input-group">
                <label for="glucosa">Valor Glucosa (mg/dL):</label>
                <input type="number" id="glucosa" value="90" min="50" max="1000">
                <p id="alert-status">ESTADO: <span id="label-status" class="status-healthy">Óptimo</span></p>
            </div>
        </header>

        <div class="main-container">
            <aside class="left-menu">
                <h2>Visualización de Sistemas</h2>
                <div class="system-controls">
                    <button class="btn-system active" data-system="esqueleto">🦴 Óseo</button>
                    <button class="btn-system" data-system="muscular">💪 Muscular</button>
                    <button class="btn-system" data-system="nervioso">⚡ Nervioso</button>
                    <button class="btn-system" data-system="digestivo">🍏 Digestivo</button>
                    <button class="btn-system" data-system="urinario">🩸 Urinario (Riñones)</button>
                    <button class="btn-system active" data-system="circulatorio">❤️ Circulatorio</button>
                    <button class="btn-system active" data-system="piel">🛡️ Piel</button>
                    <button class="btn-system active" data-system="respiratorio">🌬️ Respiratorio</button>
                </div>
            </aside>

            <main class="graphic-viewport" id="viewport">
                <div id="zoom-container">
                    <img src="contorno_cuerpo_capa.png" alt="Contorno" class="anatomy-layer base-layer" id="sys-contorno">
                    
                    <img src="esqueleto_capa.png" alt="Esqueleto" class="anatomy-layer" id="layer-esqueleto">
                    <img src="moscular_capa.png" alt="Muscular" class="anatomy-layer" id="layer-muscular">
                    <img src="nervioso_capa_1.png" alt="Nervioso" class="anatomy-layer affected" id="layer-nervioso">
                    <img src="digestivo_capa.png" alt="Digestivo" class="anatomy-layer affected" id="layer-digestivo">
                    <img src="urinario_capa.png" alt="Urinario" class="anatomy-layer affected" id="layer-urinario">
                    <img src="circulatorio_capa.png" alt="Circulatorio" class="anatomy-layer affected" id="layer-circulatorio">
                    <img src="respiratorio_capa.png" alt="Respiratorio" class="anatomy-layer" id="layer-respiratorio">
                    
                    <img src="piel_v1.png" alt="Piel" class="anatomy-layer affected" id="layer-piel">
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
