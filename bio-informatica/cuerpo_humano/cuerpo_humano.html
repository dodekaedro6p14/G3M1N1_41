     <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Anatómico Virtual - Proyecto Dora</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #818cf8;
            --accent: #e74c3c;
            --bg-color: #0f172a;
            --white: #ffffff;
            --black: #1e293b;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 2rem;
            text-align: center;
        }

        h1 {
            color: var(--white);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        /* Contenedor Principal Ajustable */
        .main-container {
            position: relative;
            width: 90vw;
            max-width: 600px;
            height: 80vh;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Sistema de Capas para las Imágenes */
        .anatomy-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            height: 95%;
            object-fit: contain;
            transition: opacity 0.5s ease;
            pointer-events: none; /* Permite que las capas no interfieran entre sí */
        }

        /* La base (Contorno blanco) siempre visible */
        .base-layer {
            z-index: 1;
            opacity: 1;
        }

        /* Los sistemas (Ajustar opacidad con JS o clases) */
        .system-layer {
            z-index: 2;
            opacity: 0.8; /* Puedes cambiar esto a 0 y activarlo con botones */
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: 1px solid var(--accent-color);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: var(--accent-color);
            color: var(--black);
        }
    </style>
</head>
<body>

    <header>
        <h1>Constructor Anatómico Virtual</h1>
        <p>Expertise by Dora: Anatomía Humana Digital</p>
    </header>

    <div class="main-container">
        <img src="./ima/contorno_cuerpo_capa.png" alt="Contorno Humano" class="anatomy-layer base-layer">

        <img src="./ima/esqueleto_capa.png" alt="Sistema Óseo" class="anatomy-layer system-layer" id="oseo">
	<img src="./ima/moscular_capa.png" alt="Sistema Moscular" class="anatomy-layer system-layer" id="moscular">
	<img src="./ima/piel_F.png" alt="Sistema Piel" class="anatomy-layer system-layer" id="piel">
	<img src="./ima/urinario_capa.png" alt="Sistema Urinario" class="anatomy-layer system-layer" id="urinario">
        <img src="./ima/nervioso_capa_1.png" alt="Sistema Nervioso" class="anatomy-layer system-layer" id="nervioso">
        <img src="./ima/digestivo_capa.png" alt="Sistema Digestivo" class="anatomy-layer system-layer" id="digestivo">
        <img src="./ima/respiratorio_capa.png" alt="Sistema Respiratorio" class="anatomy-layer system-layer" id="respiratorio">
        <img src="./ima/circulatorio_capa.png" alt="Sistema Circulatorio" class="anatomy-layer system-layer" id="circulatorio">
    </div>

    <div class="controls">
        <button onclick="toggleSystem('oseo')">Esquelético</button>
	<button onclick="toggleSystem('moscular')">Moscular</button>
	<button onclick="toggleSystem('piel')">Piel</button>
	<button onclick="toggleSystem('urinario')">Urinario</button>
        <button onclick="toggleSystem('nervioso')">Nervioso</button>
        <button onclick="toggleSystem('digestivo')">Digestivo</button>
        <button onclick="toggleSystem('respiratorio')">Respiratorio</button>
        <button onclick="toggleSystem('circulatorio')">Circulatorio</button>
    </div>

    <script>
        // Función simple para mostrar/ocultar sistemas
        function toggleSystem(id) {
            const layer = document.getElementById(id);
            if (layer.style.opacity === "0") {
                layer.style.opacity = "0.8";
            } else {
                layer.style.opacity = "0";
            }
        }

        // Inicializar ocultos para que el usuario los active
        document.querySelectorAll('.system-layer').forEach(img => img.style.opacity = "0");
    </script>

</body>
</html>
