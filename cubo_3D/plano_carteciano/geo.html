<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Laboratorio Facial 3D - Prototipo</title>
    <style>
        body {
            margin: 0;
            background-color: #050508;
            color: #00fbff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* CAPA 1: IMAGEN DE FONDO (Para calcar el rostro) */
        #background-guide {
            position: absolute;
            width: 500px; /* Ajusta según tu imagen */
            height: 500px;
            opacity: 0.3; /* Transparencia para ver los puntos encima */
            background-image: url('TU_IMAGEN_AQUI.jpg'); /* <--- COLOCA TU IMAGEN AQUÍ */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 1;
        }

        /* CAPA 2: MOTOR GRÁFICO (Canvas) */
        canvas {
            display: block;
            position: relative;
            z-index: 2; /* Por encima de la imagen */
            cursor: crosshair;
        }

        #panel-info {
            position: absolute;
            top: 20px;
            left: 20px;
            border-left: 3px solid #ff006e;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="background-guide"></div>

    <div id="panel-info">
        <h2 style="margin:0;">EDITOR_GEOMETRICO_V4</h2>
        <p style="font-size: 12px; color: cyan;">
            EJES: <span style="color:red">X (Rojo a - D)</span> | 
            <span style="color:green">Y (Verde w - s)</span> | 
            <span style="color:blue">Z (Azul)</span><br>
            MOUSE: Rotar | Q/E: Zoom | R: Reset
        </p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let angleX = 0, angleY = 0, zoom = 1.0;

        // =============================================================
        // 1. BASE DE PUNTOS EDITABLE [X, Y, Z]
        // =============================================================
        // Aquí defines la posición de cada vértice. 
        // El número a la izquierda (índice) te servirá para unirlos luego.
        const puntos = [
        // [ X, Y, Z]
            [0, 0, 0],    // 0: Centro
            [50,-50,50],    // 1: cubo
            [-50,-50,50],   // 2:
            [-50,-50,-50],  // 3:
            [50,-50,-50],   // 4: puntos inferiores
            [50, 50, 50],
            [50, 50,-50],
            [-50,50,-50],
            [-50,50, 50],

        // flor de loto 
            [0, -100, 0],  // 9: Mentón
            [-120, -50, 0], // 10: Pómulo Izq
            [120, -50, 0],  // 11: Pómulo Der
            [0, -50, -120],   // 12: Punta Nariz
            [0, -50, 120], // 13: Ojo Izq

        // centro del cubo
            [-0, -35, -0],  // 14: centro tetaedro
            [-17.68, 15, 30.62], // 15: Comisura boca Izq
            [35.36, 15, 0],  // 16: Comisura boca Der
            [-17.68, 15, -30.62],   // 17: Labio superior

        //    
            [0, -100, 70]   // 10: Labio inferior
        ];

        // =============================================================
        // 2. CONEXIONES EDITABLES (Malla)
        // =============================================================
        // Pon los pares de índices que quieres conectar con una línea.
        const conexiones = [
            [1, 2], [2, 3], [3, 4], [4, 1], // cubo
            [5, 6], [6, 4], [5, 1], [8, 5], [8, 2], [7, 3], [7,8], [7,6],
            [2, 9], [3, 9], [2, 10], [3, 10], // petalos
            [9, 1], [9, 4], [11, 1], [11, 4],
            [9, 1], [9, 2], [13, 1], [13, 2],
            [9, 4], [9, 3], [12, 4], [12, 3],
            [14,15],[15,16],[16,17],[17,14],[14,16],[15,17] // tetaedro
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function proyectar(p) {
            let x = p[0], y = p[1], z = p[2];

            // Rotación Y
            let cY = Math.cos(angleY), sY = Math.sin(angleY);
            let x1 = x * cY + z * sY;
            let z1 = -x * sY + z * cY;

            // Rotación X
            let cX = Math.cos(angleX), sX = Math.sin(angleX);
            let y2 = y * cX - z1 * sX;
            let z2 = y * sX + z1 * cX;

            let pers = 800 / (800 - z2);
            return {
                x: (x1 * pers * zoom) + width / 2,
                y: (-y2 * pers * zoom) + height / 2,
                z: z2
            };
        }

        function dibujarEjes() {
            const largo = 150;
            const origen = proyectar([0, 0, 0]);
            const ejeX = proyectar([largo, 0, 0]);
            const ejeY = proyectar([0, largo, 0]);
            const ejeZ = proyectar([0, 0, largo]);

            // X - ROJO
            ctx.beginPath(); ctx.strokeStyle = "red";
            ctx.moveTo(origen.x, origen.y); ctx.lineTo(ejeX.x, ejeX.y); ctx.stroke();
            // Y - VERDE
            ctx.beginPath(); ctx.strokeStyle = "green";
            ctx.moveTo(origen.x, origen.y); ctx.lineTo(ejeY.x, ejeY.y); ctx.stroke();
            // Z - AZUL
            ctx.beginPath(); ctx.strokeStyle = "blue";
            ctx.moveTo(origen.x, origen.y); ctx.lineTo(ejeZ.x, ejeZ.y); ctx.stroke();
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            dibujarEjes();

            const pProyectados = puntos.map(p => proyectar(p));

            // Dibujar Conexiones
            ctx.strokeStyle = "rgba(255, 179, 255, 0.3)"; //(0, 251, 255)
            conexiones.forEach(c => {
                const p1 = pProyectados[c[0]];
                const p2 = pProyectados[c[1]];
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            });

            // Dibujar Puntos e Índices
            pProyectados.forEach((p, i) => {
                ctx.fillStyle = "#ff006e";
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1, 0, Math.PI * 2);
                ctx.fill();

                // Dibujamos el número de índice para que sepas cuál es
                ctx.fillStyle = "#fff"; // def #fff
                ctx.font = "8px Arial";
                ctx.fillText(i, p.x + 8, p.y - 8);
            });

            requestAnimationFrame(loop);
        }

        // --- CONTROLES MOUSE/TECLADO ---
        let drag = false, lastX, lastY;
        canvas.onmousedown = (e) => { drag = true; lastX = e.clientX; lastY = e.clientY; };
        window.onmouseup = () => drag = false;
        window.onmousemove = (e) => {
            if (!drag) return;
            angleY += (e.clientX - lastX) * 0.01;
            angleX += (e.clientY - lastY) * 0.01;
            lastX = e.clientX; lastY = e.clientY;
        };
        window.onkeydown = (e) => {
            if(e.key == 'q') zoom += 0.1;
            if(e.key == 'e') zoom -= 0.1;
            if(e.key == 'a') angleY -= 0.1;
            if(e.key == 'd') angleY += 0.1;
            if(e.key == 'w') angleX += 0.1;
            if(e.key == 's') angleX -= 0.1;
            if(e.key == 'r') { angleX = 0; angleY = 0; zoom = 1; }
        };

        loop();
    </script>
</body>
</html>
