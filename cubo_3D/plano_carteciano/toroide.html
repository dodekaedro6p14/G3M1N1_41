<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lienzo Cuántico 3D - Fruta Edition</title>
    <style>
        /* Estilos CSS Oscuros y de Interfaz */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #08080c; 
            font-family: 'Courier New', Courier, monospace;
            color: #00ffff; 
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 1px solid #00ffff;
            border-radius: 8px;
            box-shadow: 0 0 15px #00ffff55;
            max-height: 90vh;
            overflow-y: auto;
        }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; text-transform: uppercase; }
        h3 { margin: 15px 0 5px 0; font-size: 1rem; color: #ff00ff; border-bottom: 1px solid #333; padding-bottom: 3px;}
        ul { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; }
        li { margin-bottom: 5px; }
        .key { background-color: #00ffff; color: #000; padding: 2px 6px; border-radius: 3px; font-weight: bold; }
        
        /* Estilos para los controles editables */
        .control-group { margin-top: 10px; font-size: 0.9rem;}
        label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        input[type="range"] { width: 100px; accent-color: #ff00ff; }
        input[type="color"] { background: none; border: 1px solid #00ffff; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>Control del Ecosistema</h1>
        <ul>
            <li><span class="key">W</span> / <span class="key">S</span> : Rotar X</li>
            <li><span class="key">A</span> / <span class="key">D</span> : Rotar Y</li>
            <li><span class="key">Q</span> / <span class="key">E</span> : Zoom</li>
            <li><span class="key">R</span> : Reiniciar vista</li>
            <li><span class="key">C</span> : Ver Ejes XYZ</li>
        </ul>

        <h3>Esfera Central (Punto 18)</h3>
        <div class="control-group">
            <label>Radio: <input type="range" id="sphereRadius" min="0.5" max="10" step="0.1" value="3"></label>
            <label>Color: <input type="color" id="sphereColor" value="#ff0055"></label>
            <label>Opacidad: <input type="range" id="sphereOpacity" min="0" max="1" step="0.1" value="0.8"></label>
        </div>

        <h3>Circunferencia (Ptos 1-4)</h3>
        <div class="control-group">
            <label>Color: <input type="color" id="circleColor" value="#00ff00"></label>
            <label>Grosor: <input type="range" id="circleThickness" min="0.05" max="1" step="0.05" value="0.1"></label>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Configuración de Escena y Cámara
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x08080c, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const DEFAULT_CAMERA_Z = 35;
        camera.position.z = DEFAULT_CAMERA_Z;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Ejes Cartesianos (Rojo=X, Verde=Y, Azul=Z)
        const axesHelper = new THREE.AxesHelper(15);
        scene.add(axesHelper);

        // Grupo principal para rotar todo el ecosistema junto
        const ecosistema = new THREE.Group();
        scene.add(ecosistema);

        // 3. El Toroide (Base Cuántica)
        const torusGeo = new THREE.TorusGeometry(10, 3, 30, 100);
        const torusMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.4 });
        const torus = new THREE.Mesh(torusGeo, torusMat);
        torus.rotation.x = Math.PI / 2; // Acostado por defecto
        ecosistema.add(torus);

        // --- NUEVAS ESTRUCTURAS ---

        // 4. PLANO (Puntos 5,6,7,8) - Color Random
        const planeGeo = new THREE.PlaneGeometry(30, 30);
        const randomColor = new THREE.Color(Math.random() * 0xffffff); // Genera color aleatorio
        const planeMat = new THREE.MeshBasicMaterial({ color: randomColor, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = Math.PI / 2;
        plane.position.y = -8; // Ubicado debajo del toroide
        ecosistema.add(plane);

        // 5. ESFERA (Punto 18) - Editable
        let sphereGeo = new THREE.SphereGeometry(3, 32, 32);
        const sphereMat = new THREE.MeshBasicMaterial({ color: 0xff0055, transparent: true, opacity: 0.8, wireframe: false });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        ecosistema.add(sphere);

        // 6. CIRCUNFERENCIA (Puntos 1,2,3,4) - Editable
        // Usamos un toroide muy delgado para poder controlar el "grosor" (thickness) visualmente
        let circleGeo = new THREE.TorusGeometry(14, 0.1, 16, 100);
        const circleMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const circle = new THREE.Mesh(circleGeo, circleMat);
        circle.rotation.x = Math.PI / 2;
        ecosistema.add(circle);


        // --- LÓGICA DE INTERACCIÓN Y UI ---

        // Eventos para editar la Esfera
        document.getElementById('sphereRadius').addEventListener('input', (e) => {
            sphere.geometry.dispose(); // Limpiamos la memoria de la geometría anterior
            sphere.geometry = new THREE.SphereGeometry(parseFloat(e.target.value), 32, 32);
        });
        document.getElementById('sphereColor').addEventListener('input', (e) => {
            sphere.material.color.set(e.target.value);
        });
        document.getElementById('sphereOpacity').addEventListener('input', (e) => {
            sphere.material.opacity = parseFloat(e.target.value);
        });

        // Eventos para editar la Circunferencia
        document.getElementById('circleColor').addEventListener('input', (e) => {
            circle.material.color.set(e.target.value);
        });
        document.getElementById('circleThickness').addEventListener('input', (e) => {
            circle.geometry.dispose();
            circle.geometry = new THREE.TorusGeometry(14, parseFloat(e.target.value), 16, 100);
        });


        // --- CONTROLES DE TECLADO ---
        let rotationSpeedX = 0;
        let rotationSpeedY = 0;
        const ACCELERATION = 0.05;
        const FRICTION = 0.95;

        document.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (key === 'a') rotationSpeedY -= ACCELERATION;
            if (key === 'd') rotationSpeedY += ACCELERATION;
            if (key === 'w') rotationSpeedX -= ACCELERATION;
            if (key === 's') rotationSpeedX += ACCELERATION;
            if (key === 'q') camera.position.z += 1.5; 
            if (key === 'e') camera.position.z -= 1.5; 
            
            if (key === 'r') {
                rotationSpeedX = 0;
                rotationSpeedY = 0;
                ecosistema.rotation.set(0, 0, 0); 
                camera.position.set(0, 0, DEFAULT_CAMERA_Z);
            }
            if (key === 'c') axesHelper.visible = !axesHelper.visible;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Bucle de Renderizado
        function animate() {
            requestAnimationFrame(animate);

            // Aplicamos rotación al grupo completo (ecosistema)
            ecosistema.rotation.x += rotationSpeedX;
            ecosistema.rotation.y += rotationSpeedY;
            rotationSpeedX *= FRICTION;
            rotationSpeedY *= FRICTION;

            // Ligero movimiento orgánico (respiración) de las piezas individuales
            torus.rotation.z += 0.001;
            sphere.rotation.y += 0.005;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
