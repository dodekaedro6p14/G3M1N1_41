<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Laboratorio Facial 3D - Prototipo Cuántico de Fruta</title>
    <link rel="strokeStyle" href="styles_geo.css">
</head>
<body>

    <div id="background-guide"></div>

    <div id="panel-info">
        <h2 style="margin:0; text-shadow: 0 0 5px #00fbff;">EDITOR_V5_FRUTA</h2>
        <p style="font-size: 11px; color: cyan; margin-bottom: 5px;">
            EJES: <span style="color:#ff4d4d">X(A-D)</span> | 
            <span style="color:#4dff4d">Y(W-S)</span> | 
            <span style="color:#4d4dff">Z(Q-E zoom)</span><br>
            R: Resetear Multiverso
        </p>

        <div class="control-group">
            <strong style="color: #ff006e; font-size: 12px;">ESFERA (Punto 18)</strong>
            <label>Color: <input type="color" id="esferaColor" value="#00fbff"></label>
            <label>Radio: <input type="range" id="esferaRadio" min="10" max="150" value="40"></label>
            <label>Opacidad: <input type="range" id="esferaOpacidad" min="0" max="1" step="0.1" value="0.8"></label>
        </div>

        <div class="control-group">
            <strong style="color: #ff006e; font-size: 12px;">ANILLO DE PODER (1,2,3,4)</strong>
            <label>Color: <input type="color" id="circuloColor" value="#ffb3ff"></label>
            <label>Grosor: <input type="range" id="circuloGrosor" min="1" max="10" value="2"></label>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let angleX = 0, angleY = 0, zoom = 1.0;

        // Generador de paleta surrealista aleatoria para el plano (5,6,7,8)
        function generarColorSurrealista() {
            const matices = ['#ff006e', '#8338ec', '#3a86ff', '#00fbff', '#ffbe0b'];
            return matices[Math.floor(Math.random() * matices.length)];
        }
        // Asignamos el color aleatorio al cargar el universo
        const colorPlanoRandon = generarColorSurrealista();

        // Variables dinámicas enlazadas al DOM
        const inputs = {
            eColor: document.getElementById('esferaColor'),
            eRadio: document.getElementById('esferaRadio'),
            eOpacidad: document.getElementById('esferaOpacidad'),
            cColor: document.getElementById('circuloColor'),
            cGrosor: document.getElementById('circuloGrosor')
        };

        // Función para mezclar color Hex y Opacidad
        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16),
                g = parseInt(hex.slice(3, 5), 16),
                b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        const puntos = [
            [0, 0, 0],      // 0: Centro
            [50,-50,50],    // 1: cubo
            [-50,-50,50],   // 2:
            [-50,-50,-50],  // 3:
            [50,-50,-50],   // 4: puntos inferiores
            [50, 50, 50],   // 5: puntos superiores
            [50, 50,-50],   // 6:
            [-50,50,-50],   // 7:
            [-50,50, 50],   // 8:

            [0, -100, 0],   // 9: Mentón
            [-120, -50, 0], // 10: Pómulo Izq
            [120, -50, 0],  // 11: Pómulo Der
            [0, -50, -120], // 12: Punta Nariz
            [0, -50, 120],  // 13: Ojo Izq

            [-0, -35, -0],  // 14: centro tetraedro
            [-17.68, 15, 30.62], // 15: Comisura boca Izq
            [35.36, 15, 0],      // 16: Comisura boca Der
            [-17.68, 15, -30.62],   // 17: Labio superior
            
            [0, -120, 0]     // 18: EL NUEVO NÚCLEO (Esfera Editable)
        ];

        const conexiones = [
            [1, 2], [2, 3], [3, 4], [4, 1], // cubo base
            [5, 6], [6, 4], [5, 1], [8, 5], [8, 2], [7, 3], [7,8], [7,6],
            [2, 9], [3, 9], [2, 10], [3, 10], // petalos
            [9, 1], [9, 4], [11, 1], [11, 4],
            [9, 1], [9, 2], [13, 1], [13, 2],
            [9, 4], [9, 3], [12, 4], [12, 3],
            [14,15],[15,16],[16,17],[17,14],[14,16],[15,17] // tetraedro
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function proyectar(p) {
            let x = p[0], y = p[1], z = p[2];

            // Rotación Y
            let cY = Math.cos(angleY), sY = Math.sin(angleY);
            let x1 = x * cY + z * sY;
            let z1 = -x * sY + z * cY;

            // Rotación X
            let cX = Math.cos(angleX), sX = Math.sin(angleX);
            let y2 = y * cX - z1 * sX;
            let z2 = y * sX + z1 * cX;

            // Perspectiva dinámica (el secreto del 3D)
            let pers = 800 / (800 - z2);
            return {
                x: (x1 * pers * zoom) + width / 2,
                y: (-y2 * pers * zoom) + height / 2,
                z: z2,
                escalaPerspectiva: pers * zoom // Retornamos esto para escalar la esfera y grosores
            };
        }

        function dibujarEjes() {
            const largo = 150;
            const origen = proyectar([0, 0, 0]);
            const ejeX = proyectar([largo, 0, 0]);
            const ejeY = proyectar([0, largo, 0]);
            const ejeZ = proyectar([0, 0, largo]);

            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.strokeStyle = "rgba(255,0,0,0.5)";
            ctx.moveTo(origen.x, origen.y); ctx.lineTo(ejeX.x, ejeX.y); ctx.stroke();
            ctx.beginPath(); ctx.strokeStyle = "rgba(0,255,0,0.5)";
            ctx.moveTo(origen.x, origen.y); ctx.lineTo(ejeY.x, ejeY.y); ctx.stroke();
            ctx.beginPath(); ctx.strokeStyle = "rgba(0,0,255,0.5)";
            ctx.moveTo(origen.x, origen.y); ctx.lineTo(ejeZ.x, ejeZ.y); ctx.stroke();
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            dibujarEjes();

            const pProyectados = puntos.map(p => proyectar(p));

            // ==========================================
            // MAGIA 1: PLANO DE COLOR RANDOM (5, 6, 7, 8)
            // ==========================================
            // Trazamos un polígono uniendo los puntos proyectados
            ctx.fillStyle = hexToRgba(colorPlanoRandon, 0.4); // Un toque de transparencia
            ctx.beginPath();
            ctx.moveTo(pProyectados[5].x, pProyectados[5].y);
            ctx.lineTo(pProyectados[6].x, pProyectados[6].y);
            ctx.lineTo(pProyectados[7].x, pProyectados[7].y);
            ctx.lineTo(pProyectados[8].x, pProyectados[8].y);
            ctx.closePath();
            ctx.fill();

            // ==========================================
            // MAGIA 2: CÍRCULO ENVOLVENTE (1, 2, 3, 4)
            // ==========================================
            // Como 1,2,3,4 forman un cuadrado de 100x100 en el plano Y=-50,
            // el radio de la circunferencia que los toca es la hipotenusa (aprox 70.71)
            ctx.strokeStyle = inputs.cColor.value;
            ctx.lineWidth = inputs.cGrosor.value;
            ctx.beginPath();
            const segmentos = 40;
            const radioCirculo = 70.71; 
            for(let i = 0; i <= segmentos; i++) {
                let theta = (i / segmentos) * Math.PI * 2;
                // Coordenadas trigonométricas en 3D (X y Z, Y constante en -50)
                let cx = radioCirculo * Math.cos(theta);
                let cz = radioCirculo * Math.sin(theta);
                let ptCirculo = proyectar([cx, -50, cz]);
                if(i === 0) ctx.moveTo(ptCirculo.x, ptCirculo.y);
                else ctx.lineTo(ptCirculo.x, ptCirculo.y);
            }
            ctx.stroke();
            ctx.lineWidth = 1; // Reseteo de seguridad

            // ==========================================
            // MALLA PRINCIPAL (Líneas Originales)
            // ==========================================
            ctx.strokeStyle = "rgba(255, 179, 255, 0.3)";
            conexiones.forEach(c => {
                if(pProyectados[c[0]] && pProyectados[c[1]]) {
                    const p1 = pProyectados[c[0]];
                    const p2 = pProyectados[c[1]];
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            });

            // ==========================================
            // MAGIA 3: ESFERA EN PUNTO 18
            // ==========================================
            let p18 = pProyectados[0];
            if(p18) {
                // Multiplicamos el radio por la escala de perspectiva para que 
                // respete el zoom y la profundidad tridimensional.
                let radioReal = inputs.eRadio.value * p18.escalaPerspectiva;
                
                // Efecto de esfera (Gradiente radial)
                let gradient = ctx.createRadialGradient(
                    p18.x - radioReal/3, p18.y - radioReal/3, radioReal/10, 
                    p18.x, p18.y, radioReal
                );
                gradient.addColorStop(0, '#ffffff'); // Brillo especular
                gradient.addColorStop(0.2, inputs.eColor.value);
                gradient.addColorStop(1, hexToRgba('#000000', 0.5)); // Sombra

                ctx.fillStyle = gradient;
                ctx.globalAlpha = inputs.eOpacidad.value; // Aplicar opacidad
                ctx.beginPath();
                ctx.arc(p18.x, p18.y, Math.abs(radioReal), 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0; // Reset
            }

            // Dibujar Puntos e Índices
            pProyectados.forEach((p, i) => {
                ctx.fillStyle = (i === 18) ? "#ffffff" : "#ff006e";
                ctx.beginPath();
                ctx.arc(p.x, p.y, (i===18)? 2: 1.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#fff"; 
                ctx.font = "9px Courier New";
                // Posicionar el texto un poco distinto para la esfera para que no se pise
                if(i === 18) ctx.fillText(`18: NÚCLEO`, p.x + 12, p.y - 12);
                else ctx.fillText(i, p.x + 8, p.y - 8);
            });

            requestAnimationFrame(loop);
        }

        // --- CONTROLES MOUSE/TECLADO FLUIDOS ---
        let drag = false, lastX, lastY;
        canvas.onmousedown = (e) => { drag = true; lastX = e.clientX; lastY = e.clientY; };
        window.onmouseup = () => drag = false;
        window.onmousemove = (e) => {
            if (!drag) return;
            angleY += (e.clientX - lastX) * 0.01;
            angleX += (e.clientY - lastY) * 0.01;
            lastX = e.clientX; lastY = e.clientY;
        };
        window.onkeydown = (e) => {
            if(e.key.toLowerCase() === 'q') zoom += 0.1;
            if(e.key.toLowerCase() === 'e') zoom = Math.max(0.1, zoom - 0.1); // Evitar zoom negativo
            if(e.key.toLowerCase() === 'a') angleY -= 0.1;
            if(e.key.toLowerCase() === 'd') angleY += 0.1;
            if(e.key.toLowerCase() === 'w') angleX += 0.1;
            if(e.key.toLowerCase() === 's') angleX -= 0.1;
            if(e.key.toLowerCase() === 'r') { angleX = 0; angleY = 0; zoom = 1; }
        };

        loop();
    </script>
</body>
</html>
