<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toroide Cuántico 3D - Ejes Integrados</title>
    <style>
        /* Estilos CSS Oscuros */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #08080c; /* Fondo oscuro espacial */
            font-family: 'Courier New', Courier, monospace;
            color: #00ffff; /* Texto neón */
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #00ffff;
            border-radius: 8px;
            box-shadow: 0 0 10px #00ffff55;
            pointer-events: none;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.9rem;
        }
        li { margin-bottom: 8px; }
        .key {
            background-color: #00ffff;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
        .highlight {
            color: #ff00ff; /* Color magenta para destacar los nuevos controles */
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>Control del Toroide</h1>
        <ul>
            <li><span class="key">W</span> / <span class="key">S</span> : Rotar eje X</li>
            <li><span class="key">A</span> / <span class="key">D</span> : Rotar eje Y</li>
            <li><span class="key">Q</span> / <span class="key">E</span> : Zoom (Alejar/Acercar)</li>
            <li class="highlight"><span class="key">R</span> : Reiniciar vista original</li>
            <li class="highlight"><span class="key">C</span> : Mostrar/Ocultar Ejes 3D</li>
        </ul>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Configuración de la Escena
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x08080c, 0.02);

        // Configuración de la Cámara
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const DEFAULT_CAMERA_Z = 30;
        camera.position.z = DEFAULT_CAMERA_Z;

        // Renderizador
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Creación del Toroide
        const geometry = new THREE.TorusGeometry(10, 3, 30, 100);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0x00ffff, 
            wireframe: true,
            transparent: true,
            opacity: 0.8
        });
        const torus = new THREE.Mesh(geometry, material);
        scene.add(torus);

        // --- ESTA ES LA LÍNEA QUE DEBES AGREGAR O EDITAR ---
        torus.rotation.x = Math.PI / 2; // Rota el toroide 90 grados para que quede horizontal
        // ----

        // 3. NUEVO: Agregar Ejes Cartesianos (Plano 3D)
        // El tamaño de los ejes es 15. Colores por defecto de Three.js: X=Rojo, Y=Verde, Z=Azul
        const axesHelper = new THREE.AxesHelper(15);
        scene.add(axesHelper);

        // 4. Variables de física y movimiento
        let rotationSpeedX = 0;
        let rotationSpeedY = 0;
        const ROTATION_ACCELERATION = 0.03;
        const FRICTION = 0.95;

        // 5. Controles por Teclado
        document.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            
            // Rotación Y
            if (key === 'a') rotationSpeedY -= ROTATION_ACCELERATION;
            if (key === 'd') rotationSpeedY += ROTATION_ACCELERATION;
            
            // Rotación X
            if (key === 'w') rotationSpeedX -= ROTATION_ACCELERATION;
            if (key === 's') rotationSpeedX += ROTATION_ACCELERATION;
            
            // Zoom
            if (key === 'q') camera.position.z += 1; // Alejar
            if (key === 'e') camera.position.z -= 1; // Acercar

            // NUEVO: Reiniciar Posición y Rotación (R)
            if (key === 'r') {
                rotationSpeedX = 0;
                rotationSpeedY = 0;
                torus.rotation.set(Math.PI / 2, 0, 0); // Reinicia la rotación del toroide
                camera.position.set(0, 0, DEFAULT_CAMERA_Z); // Reinicia la cámara
            }

            // NUEVO: Mostrar/Ocultar el Plano Cartesiano (C)
            if (key === 'c') {
                axesHelper.visible = !axesHelper.visible; // Invierte el estado de visibilidad
            }
        });

        // Ajuste responsivo
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Bucle de Animación
        function animate() {
            requestAnimationFrame(animate);

            torus.rotation.x += rotationSpeedX;
            torus.rotation.y += rotationSpeedY;

            rotationSpeedX *= FRICTION;
            rotationSpeedY *= FRICTION;

            // Vida del toroide (rotación suave constante)
            torus.rotation.z += 0.002;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
