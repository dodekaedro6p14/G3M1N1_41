<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Quántico - Fruta 3D</title>
    <style>
        :root {
            /* Tus variables de estilo */
            --primary: #2c3e50;
            --secondary: #818cf8;
            --accent: #e74c3c;
            --bg-color: #0f172a;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --energy-color: #f9e231; /* El brillo de la imagen */
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* El Lienzo del Mundo */
        .world-canvas {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            margin: 20px auto;
            position: relative;
            
            /* Simulación de textura y profundidad */
            background: radial-gradient(circle at 30% 30%, 
                var(--secondary) 0%, 
                var(--primary) 60%, 
                #000 100%);
            
            /* El brillo atmosférico de tu imagen */
            box-shadow: 
                inset -20px -20px 50px rgba(0,0,0,0.8),
                0 0 20px var(--accent-color),
                0 0 60px rgba(129, 140, 248, 0.3);
            
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        /* Capa de "Energía Quántica" (Manchas de luz) */
        .energy-layer {
            position: absolute;
            width: 200%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent 0%,
                transparent 10%,
                var(--energy-color) 15%,
                transparent 20%
            );
            filter: blur(40px);
            opacity: 0.4;
            mix-blend-mode: color-dodge;
        }

        h1 { color: var(--accent-color); margin-bottom: 0.5rem; }
        p { color: var(--text-color); max-width: 400px; font-size: 0.9rem; }

        .controls { margin-top: 20px; }
        button {
            background: var(--primary);
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: var(--secondary); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Visión Quántica</h1>
        <p>Una interpretación artística del mundo donde la energía y el color definen la estructura geométrica.</p>
        
        <div class="world-canvas" id="world">
            <div class="energy-layer" id="energy"></div>
        </div>

        <div class="controls">
            <button onclick="toggleRotation()">Motor On/Off</button>
        </div>
    </div>

    <script>
        let angle = 0;
        let isRotating = true;
        const world = document.getElementById('world');
        const energy = document.getElementById('energy');

        // El "Motor" del Mundo
        function rotate() {
            if (isRotating) {
                angle += 0.5; // Velocidad de rotación
                // Movemos la capa de energía para simular rotación de superficie
                energy.style.transform = `translateX(${(angle % 100) - 50}%)`;
                
                // Efecto sutil de balanceo 3D
                world.style.transform = `rotate(${angle * 0.1}deg)`;
            }
            requestAnimationFrame(rotate);
        }

        function toggleRotation() {
            isRotating = !isRotating;
        }

        // Iniciamos el motor
        rotate();
    </script>
</body>
</html>
