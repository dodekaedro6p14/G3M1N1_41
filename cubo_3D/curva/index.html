<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Cuántico Curvo - Prototipo V1</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-pink: #ff00e1;
            --bg-dark: #050505;
            --panel-bg: rgba(0, 242, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1200px; /* Profundidad de campo técnica */
        }

        /* HUD de Instrucciones - Estética Neón */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 15px;
            border: 1px solid var(--neon-cyan);
            background: rgba(0, 0, 0, 0.8);
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            z-index: 100;
            font-size: 0.85rem;
        }

        .tecla {
            color: var(--neon-cyan);
            font-weight: bold;
            border: 1px solid var(--neon-cyan);
            padding: 2px 5px;
            margin: 0 3px;
        }

        /* Escenario 3D */
        .stage {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        /* Contenedor de Documentos (La Curva) */
        .carousel {
            display: flex;
            margin-top: -400px;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
        }

        /* Estilo de cada Documento/Panel */
        .doc-panel {
            position: absolute;
            width: 400px;
            height: 550px;
            background: var(--panel-bg);
            border: 2px solid rgba(0, 242, 255, 0.3);
            backdrop-filter: blur(10px);
            padding: 20px;
            box-sizing: border-box;
            border-radius: 15px;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1), 0 0 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            transition: border-color 0.3s, box-shadow 0.3s;
            backface-visibility: hidden;
        }

        .doc-panel:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
        }

        .doc-header {
            border-bottom: 1px solid var(--neon-pink);
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
        }

        .doc-content {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #ccc;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-cyan) transparent;
        }

        /* Estética de partículas de fondo (Simulación filamentos) */
        .background-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #102030 0%, #050505 100%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="hud">
        <h3>SISTEMA DE NAVEGACIÓN CUÁNTICA</h3>
        <p><span class="tecla">A</span> / <span class="tecla">D</span> Girar Estructura (Navegar)</p>
        <p><span class="tecla">Q</span> / <span class="tecla">E</span> Control de Zoom (Profundidad)</p>
        <p><span class="tecla">R</span> Resetear Matriz</p>
    </div>

    <div class="stage">
        <div class="carousel" id="main-carousel">
            </div>
    </div>

    <script>
        const carousel = document.getElementById('main-carousel');
        const totalPanels = 12; // Número de documentos en la curva
        const radius = 900; // Radio de la curvatura profunda
        
        // Estado inicial
        let currentRotation = 0;
        let currentZoom = -radius; // Empezamos en el centro del radio
        const rotationStep = 360 / totalPanels;
        const zoomStep = 50;

        // Generar Paneles de Documentos
        function createPanels() {
            for (let i = 0; i < totalPanels; i++) {
                const panel = document.createElement('div');
                panel.className = 'doc-panel';
                
                // Cálculo de posición en círculo para efecto curvo
                const angle = i * rotationStep;
                panel.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;

                panel.innerHTML = `
                    <div class="doc-header">NODO INF-0${i+1}</div>
                    <div class="doc-content">
                        <p><strong>Interacción Cuántica detectada.</strong></p>
                        <p>Analizando filamentos luminosos en la capa de datos... El vacío no es oscuridad, es energía en reposo esperando ser observada.</p>
                        <hr style="border: 0.5px solid rgba(0,242,255,0.2)">
                        <p>Este es un contenedor para documentos completos. La arquitectura CSS permite visualizar el contenido con un efecto de profundidad envolvente.</p>
                        <p>Utiliza las funciones de teclado para desplazarte por la red de información.</p>
                    </div>
                `;
                carousel.appendChild(panel);
            }
        }

        // Motor de dirección y funciones de teclado
        function updateView() {
            // Aplicamos la rotación (teclas A/D) y el zoom (teclas Q/E)
            carousel.style.transform = `translateZ(${currentZoom}px) rotateY(${currentRotation}deg)`;
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            switch(key) {
                case 'a': // Avanzar/Girar Izquierda
                    currentRotation += rotationStep;
                    break;
                case 'd': // Avanzar/Girar Derecha
                    currentRotation -= rotationStep;
                    break;
                case 'q': // Zoom In (Acercar)
                    currentZoom += zoomStep;
                    break;
                case 'e': // Zoom Out (Alejar)
                    currentZoom -= zoomStep;
                    break;
                case 'r': // Reset
                    currentRotation = 0;
                    currentZoom = -radius;
                    break;
            }
            updateView();
        });

        // Inicializar
        createPanels();
        updateView();

    </script>
</body>
</html>
