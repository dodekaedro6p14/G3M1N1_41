<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entidad Virtual F-1</title>
    <style>
        :root {
            --cyan: #00fbff;
            --magenta: #ff006e;
            --bg-dark: #0a0a14;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, var(--bg-dark) 0%, #000000 100%);
            color: var(--cyan);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Contenedor principal con la animación de flotabilidad */
        .avatar-container {
            width: 300px;
            height: 400px;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(0, 251, 255, 0.4));
        }

        /* Animación de Flotabilidad */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Estilos del SVG */
        svg {
            width: 100%;
            height: 100%;
        }

        .hologram-line {
            fill: none;
            stroke: var(--cyan);
            stroke-width: 2;
            opacity: 0.8;
        }

        .skin { fill: rgba(10, 10, 25, 0.9); stroke: var(--cyan); stroke-width: 2; }
        .hair { fill: rgba(0, 251, 255, 0.1); stroke: var(--cyan); stroke-width: 2; }
        .eye { fill: var(--magenta); }
        .mouth { fill: var(--cyan); transform-origin: center 260px; transition: transform 0.05s; }

        /* Animación de Parpadeo (Ojos) */
        .blinking-eye {
            animation: blink 5s infinite;
            transform-origin: center 180px;
        }

        @keyframes blink {
            0%, 96%, 98%, 100% { transform: scaleY(1); }
            97%, 99% { transform: scaleY(0.1); } /* Cierra el ojo */
        }

        /* Panel de Control UI */
        .controls {
            margin-top: 40px;
            background: rgba(10, 10, 35, 0.8);
            padding: 20px;
            border: 1px solid rgba(0, 251, 255, 0.3);
            border-radius: 8px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        input[type="text"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 10px;
            width: 300px;
            font-family: inherit;
            outline: none;
        }

        button {
            background: transparent;
            border: 1px solid var(--magenta);
            color: var(--magenta);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--magenta);
            color: #fff;
            box-shadow: 0 0 15px var(--magenta);
        }
    </style>
</head>
<body>

    <div class="avatar-container">
        <svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
            <path class="hair" d="M 50 150 C 30 250, 50 350, 80 380 L 220 380 C 250 350, 270 250, 250 150 C 230 50, 70 50, 50 150 Z" />
            
            <ellipse class="skin" cx="150" cy="200" rx="80" ry="110" />
            
            <path class="hologram-line" d="M 90 230 Q 150 280 210 230" />
            <path class="hologram-line" d="M 120 280 L 180 280" />

            <g class="blinking-eye">
                <path class="hologram-line" d="M 100 175 Q 115 165 130 175" /> <ellipse class="eye" cx="115" cy="180" rx="10" ry="6" />
                <path class="hologram-line" d="M 170 175 Q 185 165 200 175" /> <ellipse class="eye" cx="185" cy="180" rx="10" ry="6" />
            </g>

            <path class="hologram-line" d="M 150 190 L 145 220 L 155 220 Z" />

            <ellipse id="avatar-mouth" class="mouth" cx="150" cy="260" rx="15" ry="2" />
        </svg>
    </div>

    <div class="controls">
        <input type="text" id="text-input" placeholder="Escribe algo para que lo diga..." value="Hola, soy tu asistente holográfica.">
        <button id="speak-btn">TRANSMITIR</button>
    </div>

    <script>
        const speakBtn = document.getElementById('speak-btn');
        const textInput = document.getElementById('text-input');
        const mouth = document.getElementById('avatar-mouth');
        
        let talkingInterval;

        // Función para simular el movimiento de los labios
        function animateMouth(isTalking) {
            if (isTalking) {
                // Genera alturas aleatorias para simular sílabas
                talkingInterval = setInterval(() => {
                    const randomHeight = Math.random() * 8 + 2; // Entre 2 y 10
                    const randomWidth = Math.random() * 5 + 12; // Entre 12 y 17
                    mouth.setAttribute('ry', randomHeight);
                    mouth.setAttribute('rx', randomWidth);
                }, 100); // Cambia cada 100ms
            } else {
                // Vuelve al estado de reposo
                clearInterval(talkingInterval);
                mouth.setAttribute('ry', 2);
                mouth.setAttribute('rx', 15);
            }
        }

        // Sistema de Voz
        speakBtn.addEventListener('click', () => {
            const text = textInput.value;
            if (!text) return;

            // Evita superposiciones si ya está hablando
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            
            // Intenta buscar una voz en español (femenina si está disponible)
            const voices = window.speechSynthesis.getVoices();
            const spanishVoice = voices.find(voice => voice.lang.startsWith('es'));
            if (spanishVoice) {
                utterance.voice = spanishVoice;
            }

            // Ajustes tonales para sonar un poco más "IA"
            utterance.pitch = 1.2;
            utterance.rate = 1.0;

            // Eventos para sincronizar la boca
            utterance.onstart = () => animateMouth(true);
            utterance.onend = () => animateMouth(false);
            utterance.onerror = () => animateMouth(false);

            // Ejecuta el audio
            window.speechSynthesis.speak(utterance);
        });

        // Carga las voces al iniciar (necesario en algunos navegadores)
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    </script>
</body>
</html>
