<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Enlace F-1</title>
    <style>
        :root {
            --cyan: #00fbff;
            --magenta: #ff006e;
            --bg-dark: #0a0a14;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, var(--bg-dark) 0%, #000000 100%);
            color: var(--cyan);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .terminal-container {
            width: 90%;
            max-width: 600px;
            background: rgba(10, 10, 25, 0.8);
            border: 2px solid var(--cyan);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 251, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--cyan);
            color: #000;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 5px;
            max-width: 80%;
            line-height: 1.4;
        }

        .user-msg {
            background: rgba(255, 0, 110, 0.2);
            border-left: 3px solid var(--magenta);
            align-self: flex-end;
            color: #fff;
        }

        .ai-msg {
            background: rgba(0, 251, 255, 0.1);
            border-left: 3px solid var(--cyan);
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            border-top: 1px solid var(--cyan);
            padding: 10px;
            background: #000;
        }

        input[type="text"] {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--cyan);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            padding: 10px;
        }

        button {
            background: transparent;
            border: 1px solid var(--magenta);
            color: var(--magenta);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--magenta);
            color: #fff;
            box-shadow: 0 0 15px var(--magenta);
        }

        .status {
            font-size: 0.8rem;
            color: #888;
            text-align: center;
            padding: 5px;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="header">Enlace Directo - Modelo: Flash Audio Preview</div>
        <div id="chat-box">
            <div class="message ai-msg">Sistemas en línea. Esperando tu API Key real en el código para iniciar la conexión.</div>
        </div>
        <div class="input-area">
            <input type="text" id="prompt-input" placeholder="Inicia la transmisión de datos..." autocomplete="off">
            <button id="send-btn">ENVIAR</button>
        </div>
        <div class="status" id="status-text">Estado: Desconectado</div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        
        // ====================================================================
        // ⚠️ ATENCIÓN: PEGA TU API KEY REAL AQUÍ ADENTRO DE LAS COMILLAS
        // Consíguela en: https://aistudio.google.com/app/apikey
        // ====================================================================
        const API_KEY = "clave aki"; 
        
        // Inicializamos el motor con tu clave
        const genAI = new GoogleGenerativeAI(API_KEY);
        
        // Configuramos el modelo que solicitaste
        const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash-native-audio-preview-12-2025" });

        const chatBox = document.getElementById('chat-box');
        const inputField = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const statusText = document.getElementById('status-text');

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-msg' : 'ai-msg');
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll
        }

        async function sendMessage() {
            const prompt = inputField.value.trim();
            if (!prompt) return;

            // 1. Mostrar mensaje del usuario
            addMessage(prompt, 'user');
            inputField.value = '';
            statusText.textContent = "Estado: Procesando transmisión...";
            statusText.style.color = "var(--magenta)";

            try {
                // 2. Enviar datos a la API
                const result = await model.generateContent(prompt);
                const response = await result.response;
                const text = response.text();

                // 3. Mostrar respuesta de la IA
                addMessage(text, 'ai');
                statusText.textContent = "Estado: Conexión estable";
                statusText.style.color = "#888";
            } catch (error) {
                console.error(error);
                addMessage("ERROR CRÍTICO: " + error.message + ". Verifica que hayas puesto una API Key válida.", 'ai');
                statusText.textContent = "Estado: Error de conexión";
                statusText.style.color = "red";
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
