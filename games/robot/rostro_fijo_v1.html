<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Laboratorio Facial 3D - Prototipo</title>
    <style>
        body {
            margin: 0;
            background-color: #050508;
            color: #00fbff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* CAPA 1: IMAGEN DE FONDO (Para calcar el rostro) */
        #background-guide {
            position: absolute;
            width: 500px; /* Ajusta según tu imagen */
            height: 500px;
            opacity: 0.3; /* Transparencia para ver los puntos encima */
            background-image: url('TU_IMAGEN_AQUI.jpg'); /* <--- COLOCA TU IMAGEN AQUÍ */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 1;
        }

        /* CAPA 2: MOTOR GRÁFICO (Canvas) */
        canvas {
            display: block;
            position: relative;
            z-index: 2; /* Por encima de la imagen */
            cursor: crosshair;
        }

        #panel-info {
            position: absolute;
            top: 20px;
            left: 20px;
            border-left: 3px solid #ff006e;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="background-guide"></div>

    <div id="panel-info">
        <h2 style="margin:0;">EDITOR_GEOMETRICO_V4</h2>
        <p style="font-size: 11px; color: #aaa;">
            EJES: <span style="color:red">X (Rojo)</span> | 
            <span style="color:green">Y (Verde)</span> | 
            <span style="color:blue">Z (Azul)</span><br>
            MOUSE: Rotar | Q/E: Zoom | R: Reset
        </p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let angleX = 0, angleY = 0, zoom = 1.0;

        // =============================================================
        // 1. BASE DE PUNTOS EDITABLE [X, Y, Z]
        // =============================================================
        // Aquí defines la posición de cada vértice. 
        // El número a la izquierda (índice) te servirá para unirlos luego.
        const puntos = [
            [0, 200, 0],    // 0: Coronilla
            [0, -180, 50],  // 1: Mentón
            [-120, 50, 20], // 2: Pómulo Izq
            [120, 50, 20],  // 3: Pómulo Der
            [0, 50, 100],   // 4: Punta Nariz
            [-40, 100, 40], // 5: Ojo Izq
            [40, 100, 40],  // 6: Ojo Der
            [-30, -80, 60], // 7: Comisura boca Izq
            [30, -80, 60],  // 8: Comisura boca Der
            [0, -60, 70],   // 9: Labio superior
            [0, -100, 70]   // 10: Labio inferior
        ];

        // =============================================================
        // 2. CONEXIONES EDITABLES (Malla)
        // =============================================================
        // Pon los pares de índices que quieres conectar con una línea.
        const conexiones = [
            [0, 2], [0, 3], [2, 1], [3, 1], // Contorno
            [5, 4], [6, 4],                 // Ojos a Nariz
            [7, 9], [8, 9], [7, 10], [8, 10] // Boca
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function proyectar(p) {
            let x = p[0], y = p[1], z = p[2];

            // Rotación Y
            let cY = Math.cos(angleY), sY = Math.sin(angleY);
            let x1 = x * cY + z * sY;
            let z1 = -x * sY + z * cY;

            // Rotación X
            let cX = Math.cos(angleX), sX = Math.sin(angleX);
            let y2 = y * cX - z1 * sX;
            let z2 = y * sX + z1 * cX;

            let pers = 800 / (800 - z2);
            return {
                x: (x1 * pers * zoom) + width / 2,
                y: (-y2 * pers * zoom) + height / 2,
                z: z2
            };
        }

        function dibujarEjes() {
            const largo = 150;
            const origen = proyectar([0, 0, 0]);
            const ejeX = proyectar([largo, 0, 0]);
            const ejeY = proyectar([0, largo, 0]);
            const ejeZ = proyectar([0, 0, largo]);

            // X - ROJO
            ctx.beginPath(); ctx.strokeStyle = "red";
            ctx.moveTo(origen.x, origen.y); ctx.lineTo(ejeX.x, ejeX.y); ctx.stroke();
            // Y - VERDE
            ctx.beginPath(); ctx.strokeStyle = "green";
            ctx.moveTo(origen.x, origen.y); ctx.lineTo(ejeY.x, ejeY.y); ctx.stroke();
            // Z - AZUL
            ctx.beginPath(); ctx.strokeStyle = "blue";
            ctx.moveTo(origen.x, origen.y); ctx.lineTo(ejeZ.x, ejeZ.y); ctx.stroke();
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            dibujarEjes();

            const pProyectados = puntos.map(p => proyectar(p));

            // Dibujar Conexiones
            ctx.strokeStyle = "rgba(0, 251, 255, 0.3)";
            conexiones.forEach(c => {
                const p1 = pProyectados[c[0]];
                const p2 = pProyectados[c[1]];
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            });

            // Dibujar Puntos e Índices
            pProyectados.forEach((p, i) => {
                ctx.fillStyle = "#ff006e";
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();

                // Dibujamos el número de índice para que sepas cuál es
                ctx.fillStyle = "#fff";
                ctx.font = "10px Arial";
                ctx.fillText(i, p.x + 8, p.y - 8);
            });

            requestAnimationFrame(loop);
        }

        // --- CONTROLES MOUSE/TECLADO ---
        let drag = false, lastX, lastY;
        canvas.onmousedown = (e) => { drag = true; lastX = e.clientX; lastY = e.clientY; };
        window.onmouseup = () => drag = false;
        window.onmousemove = (e) => {
            if (!drag) return;
            angleY += (e.clientX - lastX) * 0.01;
            angleX += (e.clientY - lastY) * 0.01;
            lastX = e.clientX; lastY = e.clientY;
        };
        window.onkeydown = (e) => {
            if(e.key == 'q') zoom += 0.1;
            if(e.key == 'e') zoom -= 0.1;
            if(e.key == 'r') { angleX = 0; angleY = 0; zoom = 1; }
        };

        loop();
    </script>
</body>
</html>
