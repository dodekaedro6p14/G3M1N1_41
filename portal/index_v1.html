<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singularidad Cuántica - Fruta Design</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="world-container">
        <h1 class="editable-title" contenteditable="true">SINGULARIDAD</h1>

        <div class="black-hole-background">
            <div class="accretion-disk"></div>
            <div class="gravitational-shadow"></div>
        </div>

        <img src="portal_v1.png" alt="Portal" class="portal-frame">

        <div class="steps-container">
            <img src="tu_escalon.png" class="step floating-step" style="animation-delay: 0s; width: 450px;">
            <img src="tu_escalon.png" class="step floating-step" style="animation-delay: 0.5s; width: 350px;">
            <img src="tu_escalon.png" class="step floating-step" style="animation-delay: 1s; width: 250px;">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
