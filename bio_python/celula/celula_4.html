<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microcosmos: Célula Interactiva</title>
    <style>
        :root {
            --cytoplasm: #fce4ec;
            --nucleus: #5c6bc0;
            --nucleolus: #283593;
            --mitochondria: #ef5350;
            --golgi: #ffa726;
            --accent: #f06292;
            --bg-dark: #1a1a2e;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* --- VISTAS --- */
        .view {
            display: none;
            height: 100vh;
            width: 100vw;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .view.active { display: flex; }

        /* --- VISTA PRINCIPAL (LA CÉLULA) --- */
        .cell-container { perspective: 1000px; position: relative; }

        .plasma-membrane {
            width: 450px; height: 450px;
            background-color: var(--cytoplasm);
            border: 8px solid var(--accent);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1), 0 0 30px rgba(240, 98, 146, 0.3);
            animation: morphing 15s infinite alternate ease-in-out;
            display: flex; justify-content: center; align-items: center;
            cursor: crosshair;
        }

        /* Estilo para elementos seleccionables */
        .organelle {
            cursor: pointer;
            transition: transform 0.3s, filter 0.3s;
        }
        .organelle:hover {
            transform: scale(1.1) !important;
            filter: brightness(1.2) drop-shadow(0 0 10px white);
        }

        .nucleus {
            width: 120px; height: 120px;
            background: var(--nucleus);
            border-radius: 50%;
            border: 4px dashed #3949ab;
            display: flex; justify-content: center; align-items: center;
            animation: float 6s infinite ease-in-out;
        }

        .mitochondria {
            position: absolute;
            width: 60px; height: 30px;
            background: var(--mitochondria);
            border-radius: 20px;
        }

        .golgi { position: absolute; bottom: 80px; left: 80px; }
        .golgi-layer { width: 70px; height: 10px; background: var(--golgi); margin: 4px; border-radius: 10px; }

        /* --- PANEL DE CONTROL (EDICIÓN) --- */
        #editor-panel {
            position: fixed;
            top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
        }

        input, select, button {
            display: block; width: 100%; margin-bottom: 10px;
            padding: 8px; border-radius: 5px; border: none;
        }

        button { background: var(--accent); color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #e91e63; }

        /* --- VISTA DE DETALLE --- */
        .detail-card {
            background: white; color: #333;
            padding: 40px; border-radius: 20px;
            max-width: 500px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .back-btn { margin-top: 20px; background: #333; }

        /* --- ANIMACIONES --- */
        @keyframes morphing {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            100% { border-radius: 60% 40% 30% 70% / 50% 60% 40% 60%; }
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(5px, -10px); }
        }

        .ribosome { position: absolute; width: 4px; height: 4px; background: #4a148c; border-radius: 50%; }
    </style>
</head>
<body>

    <div id="editor-panel">
        <h3>🧬 Editor Celular</h3>
        <label>Nuevo Elemento:</label>
        <select id="organelle-type">
            <option value="mitochondria">Mitocondria (Roja)</option>
            <option value="ribosome">Ribosoma (Punto)</option>
            <option value="lysosome">Lisosoma (Amarillo)</option>
        </select>
        <button onclick="addNewOrganelle()">Agregar a la Célula</button>
        <p style="font-size: 0.8rem; opacity: 0.7;">Haz clic en los órganos existentes para ver su información.</p>
    </div>

    <div id="main-view" class="view active">
        <div class="cell-container">
            <div class="plasma-membrane" id="cytoplasm">
                
                <div class="nucleus organelle" onclick="showDetail('Núcleo', 'Es el centro de control de la célula. Contiene el ADN y dirige la síntesis de proteínas.')">
                    <div style="width: 30px; height: 30px; background: var(--nucleolus); border-radius: 50%;"></div>
                </div>

                <div class="mitochondria organelle" style="top: 80px; right: 80px; transform: rotate(-30deg);" 
                     onclick="showDetail('Mitocondria', 'La central energética. Aquí se produce el ATP mediante la respiración celular.')"></div>
                
                <div class="golgi organelle" onclick="showDetail('Aparato de Golgi', 'Se encarga de empaquetar y distribuir proteínas y lípidos a toda la célula.')">
                    <div class="golgi-layer"></div>
                    <div class="golgi-layer" style="width: 50px;"></div>
                    <div class="golgi-layer"></div>
                </div>

            </div>
        </div>
    </div>

    <div id="detail-view" class="view">
        <div class="detail-card">
            <h1 id="detail-title">Nombre del Órgano</h1>
            <p id="detail-text">Descripción detallada aquí...</p>
            <button class="back-btn" onclick="goBack()">← Volver a la Célula</button>
        </div>
    </div>

    <script>
        const cytoplasm = document.getElementById('cytoplasm');

        // 1. Mostrar detalles (Navegación interna)
        function showDetail(title, text) {
            document.getElementById('main-view').classList.remove('active');
            document.getElementById('detail-view').classList.add('active');
            document.getElementById('detail-title').innerText = title;
            document.getElementById('detail-text').innerText = text;
        }

        function goBack() {
            document.getElementById('detail-view').classList.remove('active');
            document.getElementById('main-view').classList.add('active');
        }

        // 2. Agregar nuevos elementos dinámicamente
        function addNewOrganelle() {
            const type = document.getElementById('organelle-type').value;
            const newDiv = document.createElement('div');
            
            // Posición aleatoria
            const posX = Math.random() * 70 + 15;
            const posY = Math.random() * 70 + 15;

            if (type === 'mitochondria') {
                newDiv.className = 'mitochondria organelle';
                newDiv.style.left = posX + '%';
                newDiv.style.top = posY + '%';
                newDiv.onclick = () => showDetail('Nueva Mitocondria', 'Has añadido una central de energía extra.');
            } else if (type === 'ribosome') {
                newDiv.className = 'ribosome';
                newDiv.style.left = posX + '%';
                newDiv.style.top = posY + '%';
            } else if (type === 'lysosome') {
                newDiv.style.width = '20px';
                newDiv.style.height = '20px';
                newDiv.style.background = '#ffeb3b';
                newDiv.style.borderRadius = '50%';
                newDiv.style.position = 'absolute';
                newDiv.className = 'organelle';
                newDiv.style.left = posX + '%';
                newDiv.style.top = posY + '%';
                newDiv.onclick = () => showDetail('Lisosoma', 'Encargado de la digestión celular. ¡Limpieza en camino!');
            }

            cytoplasm.appendChild(newDiv);
        }

        // 3. Generar ribosomas iniciales
        for (let i = 0; i < 30; i++) {
            const r = document.createElement('div');
            r.className = 'ribosome';
            r.style.left = Math.random() * 80 + 10 + '%';
            r.style.top = Math.random() * 80 + 10 + '%';
            cytoplasm.appendChild(r);
        }

        // 4. Animación de seguimiento del ratón
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 60;
            const moveY = (e.clientY - window.innerHeight / 2) / 60;
            cytoplasm.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body>
</html>
