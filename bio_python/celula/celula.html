<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microcosmos: Célula Animada</title>
    <style>
        :root {
            --cytoplasm: #fce4ec;
            --nucleus: #5c6bc0;
            --nucleolus: #283593;
            --mitochondria: #ef5350;
            --golgi: #ffa726;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a2e; /* Fondo oscuro para que resalte */
            font-family: sans-serif;
        }

        .cell-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        /* Membrana Plasmática */
        .plasma-membrane {
            width: 500px;
            height: 500px;
            background-color: var(--cytoplasm);
            border: 8px solid #f06292;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1), 0 0 30px rgba(240, 98, 146, 0.3);
            animation: morphing 15s infinite alternate ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Núcleo */
        .nucleus {
            width: 150px;
            height: 150px;
            background: var(--nucleus);
            border-radius: 50%;
            position: relative;
            border: 4px dashed #3949ab;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: float 6s infinite ease-in-out;
        }

        .nucleolus {
            width: 40px;
            height: 40px;
            background: var(--nucleolus);
            border-radius: 50%;
            filter: blur(2px);
        }

        /* Mitocondria */
        .mitochondria {
            position: absolute;
            width: 60px;
            height: 30px;
            background: var(--mitochondria);
            border-radius: 20px;
            top: 100px;
            right: 80px;
            transform: rotate(-30deg);
            overflow: hidden;
        }

        .mitochondria::after {
            content: "~~~~";
            color: white;
            font-weight: bold;
            position: absolute;
            top: 5px;
            left: 5px;
        }

        /* Aparato de Golgi */
        .golgi {
            position: absolute;
            bottom: 80px;
            left: 100px;
        }

        .golgi-layer {
            width: 80px;
            height: 10px;
            background: var(--golgi);
            margin: 4px;
            border-radius: 10px;
            opacity: 0.8;
        }

        /* Animaciones */
        @keyframes morphing {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            100% { border-radius: 60% 40% 30% 70% / 50% 60% 40% 60%; }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(10px, -15px); }
        }

        /* Ribosomas (puntos pequeños generados por JS) */
        .ribosome {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #4a148c;
            border-radius: 50%;
            pointer-events: none;
        }

        .label {
            position: absolute;
            color: #1a1a2e;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="cell-container">
    <div class="plasma-membrane" id="cytoplasm">
        <div class="label" style="top: 20px;">Citoplasma</div>
        
        <div class="nucleus">
            <div class="nucleolus"></div>
            <div class="label" style="bottom: -20px; color: white;">Núcleo</div>
        </div>

        <div class="mitochondria"></div>
        <div class="mitochondria" style="top: 300px; right: 120px; transform: rotate(45deg);"></div>

        <div class="golgi">
            <div class="golgi-layer" style="width: 60px;"></div>
            <div class="golgi-layer"></div>
            <div class="golgi-layer" style="width: 70px;"></div>
            <div class="label" style="bottom: -20px;">Aparato de Golgi</div>
        </div>
    </div>
</div>

<script>
    // Generar Ribosomas aleatorios en el citoplasma
    const cytoplasm = document.getElementById('cytoplasm');
    const numRibosomes = 40;

    for (let i = 0; i < numRibosomes; i++) {
        const ribosome = document.createElement('div');
        ribosome.className = 'ribosome';
        
        // Posición aleatoria dentro de la célula
        const x = Math.random() * 80 + 10;
        const y = Math.random() * 80 + 10;
        
        ribosome.style.left = `${x}%`;
        ribosome.style.top = `${y}%`;
        
        // Animación individual para cada ribosoma
        ribosome.animate([
            { transform: 'translate(0, 0)' },
            { transform: `translate(${Math.random() * 20 - 10}px, ${Math.random() * 20 - 10}px)` }
        ], {
            duration: 3000 + Math.random() * 2000,
            direction: 'alternate',
            iterations: Infinity,
            easing: 'ease-in-out'
        });

        cytoplasm.appendChild(ribosome);
    }

    // Interacción simple: la célula sigue ligeramente el ratón
    document.addEventListener('mousemove', (e) => {
        const moveX = (e.clientX - window.innerWidth / 2) / 50;
        const moveY = (e.clientY - window.innerHeight / 2) / 50;
        cytoplasm.style.transform = `translate(${moveX}px, ${moveY}px)`;
    });
</script>

</body>
</html>
