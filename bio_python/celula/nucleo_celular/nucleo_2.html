<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microcosmos: Núcleo de Alta Definición</title>
    <style>
        :root {
            --bg-dark: #0a0a1a;
            --n-outer: #5c6bc0;
            --n-inner: #1a237e;
            --glow: #818cf8;
            --nucleolus-glow: #c084fc;
            --dna-strand: #4deeea;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* Lienzo de fondo (Partículas) */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Contenedor de Vistas */
        .page {
            display: none;
            width: 100vw; height: 100vh;
            justify-content: center;
            align-items: center;
            position: absolute;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active { display: flex; flex-direction: column; opacity: 1; }

        /* --- ESTILO DEL NÚCLEO INSPIRADO EN LA IMAGEN --- */
        .nucleus-container {
            position: relative;
            width: 450px; height: 450px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }

        .nucleus-outer {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(92, 107, 192, 0.2) 100%);
            border: 2px solid rgba(129, 140, 248, 0.3);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(129, 140, 248, 0.2);
            animation: breathe 8s infinite alternate ease-in-out;
        }

        .nucleus-core {
            width: 380px; height: 380px;
            background: radial-gradient(circle, var(--n-inner), #000);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid var(--glow);
            box-shadow: inset 0 0 50px var(--glow);
        }

        /* Cromatina (Hilos de ADN) */
        .chromatin-fiber {
            position: absolute;
            width: 110%; height: 110%;
            border: 1px solid var(--dna-strand);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            opacity: 0.2;
            animation: rotate-dna 15s infinite linear;
        }

        .nucleolus {
            width: 120px; height: 120px;
            background: radial-gradient(circle, #fff, var(--nucleolus-glow), var(--n-inner));
            border-radius: 50%;
            box-shadow: 0 0 40px var(--nucleolus-glow), inset 0 0 20px #000;
            z-index: 5;
            transition: 0.5s;
        }

        /* Tooltip dinámico */
        .info-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--glow);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .nucleus-container:hover .info-label { opacity: 1; }
        .nucleus-container:hover .nucleolus { transform: scale(1.1); filter: brightness(1.3); }

        /* --- VISTA EDITABLE --- */
        #edit-view { background: radial-gradient(circle at center, #16213e, #0a0a1a); }

        .card-editor {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 80%; max-width: 700px;
            text-align: center;
        }

        textarea {
            width: 100%; height: 200px;
            background: rgba(0,0,0,0.5);
            color: var(--dna-strand);
            border: 1px solid var(--n-outer);
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            margin: 20px 0; outline: none;
        }

        .back-button {
            background: transparent;
            color: var(--glow);
            border: 1px solid var(--glow);
            padding: 10px 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .back-button:hover { background: var(--glow); color: #000; }

        /* --- ANIMACIONES --- */
        @keyframes breathe {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.05); opacity: 0.8; }
        }

        @keyframes rotate-dna {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(360deg) scale(1.1); }
        }

        h1 { font-weight: 200; letter-spacing: 10px; margin-bottom: 40px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="home-view" class="page active">
        <h1>NUCLEUS</h1>
        
        <div class="nucleus-container" onclick="changePage('edit-view')">
            <div class="info-label" id="main-tag">ESTRUCTURA NUCLEAR</div>
            
            <div class="nucleus-outer"></div>
            
            <div class="nucleus-core">
                <div class="chromatin-fiber"></div>
                <div class="chromatin-fiber" style="animation-duration: 25s; border-color: var(--nucleolus-glow); animation-direction: reverse;"></div>
                <div class="chromatin-fiber" style="animation-duration: 18s; opacity: 0.1;"></div>
                
                <div class="nucleolus"></div>
            </div>
        </div>
        
        <p style="margin-top: 40px; font-size: 0.7rem; letter-spacing: 4px; opacity: 0.5;">CLICK PARA EXPLORAR CÓDIGO GENÉTICO</p>
    </div>

    <div id="edit-view" class="page">
        <div class="card-editor">
            <h2 style="color: var(--glow)">EDITOR DE MEMORIA CELULAR</h2>
            <p>Modifica la información almacenada en los ácidos nucleicos:</p>
            
            <textarea id="dna-data">
> SECUENCIA ADN LOCALIZADA...
> ESTADO: ESTABLE
> NOTAS: Este es el centro de mando. 
  Aquí puedes escribir tus propios apuntes sobre el proyecto.
  Todo se mueve con la fluidez de la vida.
            </textarea>

            <br>
            <button class="back-button" onclick="changePage('home-view')">Guardar y Salir</button>
        </div>
    </div>

    <script>
        // Sistema de navegación
        function changePage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // Seguimiento del ratón para el label
        const container = document.querySelector('.nucleus-container');
        const tag = document.getElementById('main-tag');

        container.addEventListener('mousemove', (e) => {
            tag.style.left = (e.clientX - container.getBoundingClientRect().left + 20) + 'px';
            tag.style.top = (e.clientY - container.getBoundingClientRect().top - 40) + 'px';
        });

        // Fondo de partículas fluido
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.alpha = Math.random();
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(129, 140, 248, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 150; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();
    </script>
</body>
</html>
