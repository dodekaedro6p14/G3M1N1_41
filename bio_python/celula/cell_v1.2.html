<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Celular 3D - Perspective Lab</title>
    
    <style>
        :root {
            /* Paleta estándar CSS */
            --primary: #2c3e50;
            --secondary: #818cf8;
            --accent: #e74c3c;
            --bg-color: #0f172a;
            --text-color: #c9d1d9;
            --white: #ffffff;
            --black: #1e293b;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --energy-color: #f9e231;
            --border-color: #30363d;
            
            /* Variables de diseño orgánico */
            --cytoplasm-glow: rgba(88, 166, 255, 0.15);
            --membrane-speed: 8s;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); /* Fondo líquido */
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-color);
            /* Activamos la perspectiva global para el efecto 3D */
            perspective: 1200px; 
        }

        #canvas-particles {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        /* ESCENA 3D */
        .world {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transform-style: preserve-3d;
        }

        /* CONTENEDOR DE LA CÉLULA CON INCLINACIÓN */
        .cell-membrane {
            position: relative;
            width: 75vh;
            height: 75vh;
            background: var(--cytoplasm-glow);
            border: 6px solid var(--accent-color);
            border-radius: 50%;
            /* Inclinación solicitada de 50 grados */
            transform: rotateX(50deg); 
            box-shadow: 
                0 0 50px rgba(88, 166, 255, 0.4),
                inset 0 0 100px rgba(88, 166, 255, 0.2);
            animation: breathe 8s infinite ease-in-out;
            transform-style: preserve-3d;
        }

        /* Contenedor de organelas para corregir la perspectiva visual */
        .organelle-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
        }

        /* ORGANELA (LINK EDITABLE) */
        .organelle {
            position: absolute;
            z-index: 20;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Compensamos la inclinación del padre para que la imagen se vea "de frente" */
            transform: rotateX(-50deg); 
        }

        .organelle:hover {
            filter: drop-shadow(0 0 15px var(--energy-color));
            margin-top: -10px; /* Efecto de flotación al hover */
        }

        .organelle img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ANIMACIONES */
        @keyframes breathe {
            0%, 100% { transform: rotateX(50deg) scale(1); }
            50% { transform: rotateX(52deg) scale(1.05); } /* El cambio de ángulo simula volumen */
        }

        /* INTERFAZ */
        .ui-panel {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(22, 27, 34, 0.8);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-color);
            z-index: 100;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <canvas id="canvas-particles"></canvas>

    <div class="ui-panel">
        <h3 style="margin:0; color:var(--accent-color);">Laboratorio Bio-Digital</h3>
        <p style="font-size: 0.9em; opacity: 0.8;">Célula Humana en Perspectiva 3D (50°)</p>
    </div>

    <div class="world">
        <div class="cell-membrane">
            <div class="organelle-layer">
                
                <a href="celula_interactiva/mitocondria/mitocondria_detallada.png" class="organelle" style="width: 150px; top: 75%; left: 12%;">

                    </a>

                    <img src="ima/mitocondria_sinfondo_ori.png" alt="Mitocondria">

            	    <img src="ima/mitocondria_sinfondo_2.png" text="Mitocondria" alt="Mitocondria">
       		    </a>
		<a href="#mitocondria_detalle.html" class="organelle" style="width: 120px; top: 34%; left: 4%;">

            	    <img src="ima/lisosomes_sinfondo.png" text="Mitocondria" alt="Mitocondria">
       		    </a>
		<a href="#lisosomes.html" class="organelle" style="width: 50px; top: 64%; left: 56%;">
            	    <img src="ima/lisosomes_sinfondo.png" text="Mitocondria" alt="Mitocondria">
       		    </a>
		<a href="#lisosomes.html" class="organelle" style="width: 40px; top: 71%; left: 44%;">

       		    </a>

                </div>
        </div>
    </div>

    <script>
        // MOTOR DE PARTÍCULAS (JavaScript Animación)
        const canvas = document.getElementById('canvas-particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.alpha = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(201, 209, 217, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
