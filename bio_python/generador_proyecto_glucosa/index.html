<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bio-Monitor de Daño Sistémico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <section class="ui-panel">
            <h1>Impacto de Glucemia CGM</h1>
            <div class="input-box">
                <label>Valor de Glucosa actual:</label>
                <input type="number" id="glucose-val" value="100" min="50" max="450">
                <p id="alert-text">Estado: <span id="label-status">Óptimo</span></p>
            </div>
            
            <div class="data-feedback">
                <p><strong>Órganos en Alerta:</strong></p>
                <ul id="organ-list">
                    <li>Corazón: Estable</li>
                    <li>Riñones: Filtrando</li>
                    <li>Nervios: Conducción Normal</li>
                </ul>
            </div>

            <a href="preventivo_alimenticio.html" class="btn-link">Ver Tratamiento y Dieta ADN</a>
        </section>

        <section class="graphic-display">
            <svg id="human-svg" viewBox="0 0 400 600">
                <path id="skin" d="M200,50 Q250,50 250,100 L260,200 L250,220 L250,400 L280,550 L240,550 L210,420 L190,420 L160,550 L120,550 L150,400 L150,220 L140,200 L150,100 Q150,50 200,50" fill="#ff9ff3" opacity="0.3"/>
                
                <circle id="eyes" cx="185" cy="85" r="8" fill="#f9e231" />
                <circle cx="215" cy="85" r="8" fill="#f9e231" />

                <path id="heart" d="M190,140 Q200,120 210,140 Q200,160 190,140" fill="#e74c3c" />
                <path id="vessels" d="M200,160 L200,380 M120,220 L280,220" stroke="#e74c3c" stroke-width="4" fill="none" />

                <rect id="kidneys" x="165" y="250" width="20" height="30" rx="10" fill="#2ecc71" />
                <rect x="215" y="250" width="20" height="30" rx="10" fill="#2ecc71" />

                <path id="liver" d="M160,190 L210,185 L220,210 L160,220 Z" fill="#9b59b6" />

                <circle id="digestive" cx="200" cy="300" r="25" fill="#e67e22" opacity="0.8"/>

                <path id="nerves" d="M100,200 L50,300 M300,200 L350,300 M150,400 L100,550 M250,400 L300,550" stroke="#818cf8" stroke-width="2" fill="none" />

                <ellipse id="feet" cx="140" cy="555" rx="20" ry="10" fill="#00ffff" />
                <ellipse cx="260" cy="555" rx="20" ry="10" fill="#00ffff" />
            </svg>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
