        /* Efectos de interacción */
        .organelle { cursor: pointer; transition: all 0.3s ease; opacity: 0.9; }
        .organelle:hover { opacity: 1; filter: brightness(1.3) contrast(1.1); stroke: #fff; stroke-width: 2px; }
        
        .info-card { margin-top: 20px; padding: 20px; border-radius: 12px; background: #1e293b; border: 1px solid #334155; max-width: 500px; text-align: center; }
        code { color: #fb7185; background: #312e81; padding: 2px 4px; border-radius: 4px; }
    </style>
