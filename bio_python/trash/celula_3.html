<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Célula Humana Interactiva</title>
    <style>
        :root {
            --cytoplasm: radial-gradient(circle, #ffefef 0%, #f7dada 100%);
            --nucleus: radial-gradient(circle, #5d2a80 0%, #2a0944 100%);
            --mitochondria: #ff4d4d;
            --golgi: #f0a500;
            --reticulum: #3498db;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenedor Principal (Citoplasma) */
        #cell-container {
            width: 100vw;
            height: 100vh;
            background: var(--cytoplasm);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Membrana Plasmática con efecto de fluidez */
        .membrane {
            position: absolute;
            width: 110%;
            height: 110%;
            border: 15px solid rgba(255, 255, 255, 0.3);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: pulseMembrane 10s infinite alternate ease-in-out;
        }

        /* Núcleo */
        .nucleus {
            width: 250px;
            height: 250px;
            background: var(--nucleus);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset -10px -10px 30px rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .nucleolus {
            width: 60px;
            height: 60px;
            background: #1a052e;
            border-radius: 50%;
            filter: blur(2px);
        }

        /* Organelos Genéricos */
        .organelle {
            position: absolute;
            transition: transform 0.1s ease-out;
            cursor: help;
        }

        /* Mitocondrias */
        .mitochondria {
            width: 80px;
            height: 40px;
            background: var(--mitochondria);
            border-radius: 50px;
            box-shadow: inset 0 0 10px #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mitochondria::after {
            content: "~~~~";
            color: rgba(0,0,0,0.2);
            font-weight: bold;
        }

        /* Aparato de Golgi */
        .golgi {
            width: 100px;
            height: 15px;
            background: var(--golgi);
            border-radius: 20px;
            box-shadow: 0 10px 0 var(--golgi), 0 20px 0 var(--golgi);
        }

        /* Retículo Endoplasmático */
        .reticulum {
            width: 150px;
            height: 150px;
            border: 8px double var(--reticulum);
            border-radius: 40%;
            opacity: 0.6;
        }

        /* Lisosomas y Peroxisomas (Vesículas) */
        .vesicle {
            border-radius: 50%;
            background: radial-gradient(circle, #e74c3c, #c0392b);
        }

        /* Citoesqueleto */
        .microtubule {
            position: absolute;
            background: rgba(100, 100, 255, 0.2);
            height: 2px;
            width: 200px;
            z-index: 1;
        }

        /* Etiquetas */
        .label {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
        }

        @keyframes pulseMembrane {
            from { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            to { border-radius: 60% 40% 30% 70% / 50% 60% 40% 60%; }
        }

        #info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 10px;
            max-width: 300px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="info-panel">
        <h2 style="margin-top:0">Célula Humana</h2>
        <p>Mueve el ratón para generar perspectiva. Haz clic en los organelos para identificarlos.</p>
        <div id="organelle-name">Explora la célula...</div>
    </div>

    <div id="cell-container">
        <div class="membrane"></div>
        
        <div class="nucleus organelle" data-name="Núcleo: Centro de control (ADN)">
            <div class="nucleolus"></div>
        </div>

        </div>

    <script>
        const container = document.getElementById('cell-container');
        const infoText = document.getElementById('organelle-name');

        // Configuración de organelos
        const organellesConfig = [
            { type: 'mitochondria', count: 6, name: 'Mitocondria: Central energética (ATP)' },
            { type: 'golgi', count: 2, name: 'Aparato de Golgi: Empaquetado de proteínas' },
            { type: 'reticulum', count: 1, name: 'Retículo Endoplasmático: Síntesis de lípidos/proteínas' },
            { type: 'vesicle', count: 12, name: 'Vesícula/Lisosoma: Digestión y transporte' },
            { type: 'microtubule', count: 15, name: 'Citoesqueleto: Soporte estructural' }
        ];

        // Función para crear elementos aleatorios
        function createOrganelles() {
            organellesConfig.forEach(config => {
                for (let i = 0; i < config.count; i++) {
                    const el = document.createElement('div');
                    el.className = `organelle ${config.type}`;
                    
                    // Posición aleatoria
                    const x = Math.random() * 80 + 10;
                    const y = Math.random() * 80 + 10;
                    
                    el.style.left = `${x}%`;
                    el.style.top = `${y}%`;
                    
                    if(config.type === 'vesicle') {
                        const size = Math.random() * 20 + 10;
                        el.style.width = `${size}px`;
                        el.style.height = `${size}px`;
                    }

                    if(config.type === 'microtubule') {
                        el.style.transform = `rotate(${Math.random() * 360}deg)`;
                    }

                    el.addEventListener('mouseover', () => {
                        infoText.innerText = config.name;
                        el.style.filter = "brightness(1.5) scale(1.1)";
                    });

                    el.addEventListener('mouseout', () => {
                        el.style.filter = "none";
                    });

                    container.appendChild(el);
                }
            });
        }

        // Efecto Parallax / Movimiento con el ratón
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 30;
            const y = (e.clientY / window.innerHeight - 0.5) * 30;

            document.querySelectorAll('.organelle').forEach(el => {
                const depth = Math.random() * 0.5 + 0.2;
                el.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
            });
            
            // Mover el núcleo con menos intensidad para dar profundidad
            const nucleus = document.querySelector('.nucleus');
            nucleus.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
        });

        createOrganelles();
    </script>
</body>
</html>
