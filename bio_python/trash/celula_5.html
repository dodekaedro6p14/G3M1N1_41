<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualización Celular 3D - Bio_Nano & Molecula</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #818cf8;
            --bg-color: #0f172a;
            --color-fuente: #fff;
            --accent-color: #58a6ff;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--color-fuente);
            overflow: hidden; /* Evita scroll durante el zoom */
            font-family: sans-serif;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        .label {
            color: var(--secondary);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="label">Vista Microscópica: Célula 3D</div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        // --- Configuración de la Escena ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- Creación de la Célula (Esfera Orgánica) ---
        // Usamos una geometría con muchos segmentos para suavidad
        const geometry = new THREE.IcosahedronGeometry(1, 15);
        const material = new THREE.MeshPhongMaterial({
            color: 0x818cf8, // Usando var(--secondary)
            wireframe: true,
            transparent: true,
            opacity: 0.6
        });
        
        const cell = new THREE.Mesh(geometry, material);
        scene.add(cell);

        // Núcleo celular
        const nucleusGeom = new THREE.SphereGeometry(0.3, 32, 32);
        const nucleusMat = new THREE.MeshPhongMaterial({ color: 0xe74c3c }); // --accent
        const nucleus = new THREE.Mesh(nucleusGeom, nucleusMat);
        scene.add(nucleus);

        // --- Iluminación ---
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 3;

        // --- Controles de Zoom (Vista Microscópica) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 0.5; // Límite de zoom microscópico
        controls.maxDistance = 5;

        // --- Animación y Deformación ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Simulación de movimiento biológico (latido)
            const time = Date.now() * 0.001;
            cell.rotation.y += 0.005;
            cell.scale.set(
                1 + Math.sin(time) * 0.05,
                1 + Math.cos(time) * 0.05,
                1 + Math.sin(time) * 0.05
            );

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Ajuste dinámico de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
