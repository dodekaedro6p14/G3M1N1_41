<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red de Energía Intensa - Responsivo</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #eee;
            --accent-glow: #00f0ff; 
            --card-bg: rgba(10, 10, 15, 0.9); /* Un poco más opaco para legibilidad */
            --border-color: #30363d;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* AJUSTE AUTOMÁTICO DE LA INTERFAZ */
        .interface-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; /* Margen de seguridad para pantallas pequeñas */
            box-sizing: border-box;
        }

        .central-card {
            /* Cambio clave: Usamos clamp para que el ancho sea fluido */
            /* clamp(mínimo, preferido, máximo) */
            width: clamp(280px, 90%, 500px); 
            
            padding: clamp(1.5rem, 5vw, 3rem); /* Espaciado interno dinámico */
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            pointer-events: auto; /* Permite clics en la tarjeta */
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
            backdrop-filter: blur(8px); /* Efecto cristal moderno */
            transition: transform 0.3s ease;
        }

        .central-card:hover {
            transform: scale(1.02); /* Pequeña animación de enfoque */
            border-color: var(--accent-glow);
        }

        h1 {
            color: var(--accent-glow);
            margin: 0 0 1rem 0;
            font-size: clamp(1.2rem, 4vw, 2rem); /* Texto que escala con la pantalla */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            line-height: 1.6;
            color: #ccc;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--accent-glow);
            border-radius: 20px;
            color: var(--accent-glow);
            font-size: 0.8rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="energyCanvas"></canvas>
    </div>

    <div class="interface-overlay">
        <div class="central-card">
            <h1>Sistema de Energía</h1>
            <p>Monitoreo de red eléctrica de alta frecuencia activado. Todos los nodos operando dentro de los parámetros estables de la simulación cuántica.</p>
            <div class="status-badge">NÚCLEO ESTABLE</div>
        </div>
    </div>

    <script>
        // Mantenemos tu lógica de animación del canvas, que ya es excelente.
        const canvas = document.getElementById('energyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Simulación simple de fondo para mantener el efecto visual
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // Aquí iría tu lógica original de rayos y puntos
            // (La he omitido para brevedad, pero puedes pegarla aquí mismo)
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
